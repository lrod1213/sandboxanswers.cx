<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" fill="none" aria-hidden="true">
  <defs>
    <radialGradient id="mesh-purple" cx="30%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#9333EA" stop-opacity="0.9"/>
      <stop offset="50%" stop-color="#5EEAD4" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#5EEAD4" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="mesh-violet" cx="70%" cy="30%" r="45%">
      <stop offset="0%" stop-color="#A78BFA" stop-opacity="0.85"/>
      <stop offset="50%" stop-color="#9F31CB" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#9F31CB" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="mesh-amber" cx="55%" cy="70%" r="40%">
      <stop offset="0%" stop-color="#9F31CB" stop-opacity="0.7"/>
      <stop offset="50%" stop-color="#FF9E0B" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#FF9E0B" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="mesh-mint" cx="20%" cy="75%" r="35%">
      <stop offset="0%" stop-color="#5EEAD4" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#5EEAD4" stop-opacity="0"/>
    </radialGradient>
    <filter id="mesh-blur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="40"/>
    </filter>
  </defs>
  <g filter="url(#mesh-blur)">
    <ellipse cx="360" cy="240" rx="420" ry="320" fill="url(#mesh-purple)"/>
    <ellipse cx="840" cy="180" rx="380" ry="280" fill="url(#mesh-violet)"/>
    <ellipse cx="660" cy="420" rx="360" ry="260" fill="url(#mesh-amber)"/>
    <ellipse cx="240" cy="450" rx="280" ry="200" fill="url(#mesh-mint)"/>
  </g>
</svg>
